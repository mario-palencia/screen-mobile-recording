<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Mobile Recording</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <a href="https://chromewebstore.google.com/detail/mobile-screen-recorder-fr/eacnknejmecpgalmoaijlhhikncphojj" target="_blank" class="title-link">
          <h1 class="title">
            <svg class="title-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
              <path fill="#ffffff" d="M128 128C92.7 128 64 156.7 64 192L64 448C64 483.3 92.7 512 128 512L384 512C419.3 512 448 483.3 448 448L448 192C448 156.7 419.3 128 384 128L128 128zM496 400L569.5 458.8C573.7 462.2 578.9 464 584.3 464C597.4 464 608 453.4 608 440.3L608 199.7C608 186.6 597.4 176 584.3 176C578.9 176 573.7 177.8 569.5 181.2L496 240L496 400z"/>
            </svg>
            Screen Mobile Recording
          </h1>
        </a>
      </div>
    </header>

    <main class="content">
      
      <!-- Error Message (hidden by default) -->
      <div id="error-banner" class="error-banner" style="display: none;">
        <span id="error-message"></span>
        <button id="error-dismiss" class="error-dismiss">&times;</button>
      </div>
      
      <!-- Main Actions Grid -->
      <div class="action-grid">
        <button id="start-btn" class="action-card primary">
          <div class="icon-circle">
            <div class="record-dot"></div>
          </div>
          <span>Start Recording</span>
        </button>
        
        <button id="screenshot-btn" class="action-card secondary">
          <div class="icon-circle">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
          </div>
          <span>Screenshot</span>
        </button>
      </div>

      <!-- Settings Sections -->
      <div class="settings-container">
        
        <!-- Device Appearance -->
        <div class="settings-group">
          <div class="group-header">DEVICE APPEARANCE</div>
          
          <div class="setting-row">
            <label>Show Device Frame</label>
            <label class="switch">
              <input type="checkbox" id="frame-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>

          <div class="setting-row">
            <label>Dynamic Island / Notch</label>
            <label class="switch">
              <input type="checkbox" id="notch-toggle" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- Output Formats -->
        <div class="settings-group">
          <div class="group-header">OUTPUT FORMATS</div>
          
          <div class="formats-row">
            <label class="checkbox-pill">
              <input type="checkbox" id="mp4-toggle" checked>
              <span>MP4</span>
            </label>
            <label class="checkbox-pill">
              <input type="checkbox" id="webm-toggle" checked>
              <span>WebM</span>
            </label>
            <label class="checkbox-pill">
              <input type="checkbox" id="gif-toggle" checked>
              <span>GIF</span>
            </label>
          </div>

          <div class="setting-row" style="margin-top: 12px;">
            <label>Background Style</label>
            <div class="bg-style-container">
              <select id="bg-style" class="styled-select">
                <option value="transparent">Transparent</option>
                <option value="#00FF00">Green Screen</option>
                <option value="#0000FF">Blue Screen</option>
                <option value="#FFFFFF">White</option>
                <option value="#000000">Black</option>
                <option value="custom">Custom...</option>
              </select>
              <input type="color" id="bg-color-picker" class="color-picker" value="#FF0000" title="Pick custom color">
            </div>
          </div>
        </div>

      </div>
    </main>

    <footer class="footer">
      <div class="footer-credits">
        <span>Developed by fever SEO Team</span>
        <span class="separator">•</span>
        <a href="https://careers.feverup.com/" target="_blank" class="hiring-link">We are hiring!</a>
        <span class="separator">•</span>
        <a href="https://www.linkedin.com/in/mariopalencia/" target="_blank" class="author-link">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
          </svg>
          Mario Palencia
        </a>
      </div>
      <div class="footer-powered">
        <a href="https://business.feverup.com/" target="_blank">
          <img src="icons/powered-by-fever.svg" alt="Powered by Fever" class="powered-badge">
        </a>
      </div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
